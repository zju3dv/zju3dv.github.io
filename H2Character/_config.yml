# GitHub Pages Configuration

# Site settings
title: H2Char - 3D Character Motion Retargeting
description: State-of-the-art motion retargeting system for 3D character animation
baseurl: "/H2Char" # 如果项目在username.github.io/H2Char，否则留空
url: "https://yourusername.github.io" # 替换为您的GitHub用户名

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed

# Theme settings (optional)
# theme: minima

# Exclude list
exclude:
  - .github/
  - README.md
  - LICENSE
  - .gitignore
  - config.json
  - docs/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default